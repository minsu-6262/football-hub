spring:
  application:
    name: backend

  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: jdbc:mysql://localhost:3306/football_hub?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

football:
  api:
    base-url: https://v3.football.api-sports.io
    key: ${FOOTBALL_API_KEY}

server:
  port: 8080